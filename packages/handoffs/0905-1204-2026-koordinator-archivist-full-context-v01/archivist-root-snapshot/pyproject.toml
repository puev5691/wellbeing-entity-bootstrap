[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "wellbeing-archivist"
version = "0.1.0"
description = "Local MVP archivist for the Wellbeing project file storage"
readme = "README.md"
requires-python = ">=3.10"
authors = [
  { name = "puev5691" }
]
dependencies = []

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
